<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="description" content="Salma Mohamed Sayed — Software Engineer portfolio spanning AI, web, mobile, embedded systems, and testing." />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/site.webmanifest" />
    <link rel="canonical" href="https://salma-mohamed.com/" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Noto+Sans+Arabic:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('salma-theme');
          var systemDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
          var theme = stored || (systemDark ? 'dark' : 'light');
          document.documentElement.dataset.theme = theme;
        } catch (error) {
          document.documentElement.dataset.theme = 'dark';
        }
      })();
    </script>
    <title>Salma Mohamed Sayed | Software Engineer</title>
  </head>
  <body>
    <noscript>
      <div style="padding:1rem;font-family:system-ui,sans-serif;background:#0f172a;color:#fff;text-align:center">
        This portfolio is readable without JavaScript in the CV PDF, but the interactive website requires JavaScript.
      </div>
    </noscript>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
